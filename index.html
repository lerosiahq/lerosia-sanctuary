<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Erosia — Entry Gate</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center bg-[#0a0a0a] px-4">

    <div class="max-w-md w-full bg-[#121212] border border-[#222] rounded-2xl p-8 space-y-6 shadow-2xl">
        <div class="text-center space-y-2">
            <h1 class="text-xl tracking-[0.4em] text-[#8d0b0b] font-bold uppercase">L'Erosia</h1>
            <p id="portalSubtitle" class="text-xs uppercase tracking-widest text-gray-400">Initialize Premium Entry</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">Digital Identifier (Email)</label>
                <input type="email" id="emailInput" required class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg p-3 text-sm focus:outline-none focus:border-[#8d0b0b] text-white">
            </div>
            
            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">Security Key (Password)</label>
                <input type="password" id="passwordInput" required class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg p-3 text-sm focus:outline-none focus:border-[#8d0b0b] text-white">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-[#8d0b0b] hover:bg-[#b00e0e] text-white text-xs uppercase font-bold tracking-widest py-3 rounded-lg transition-colors cursor-pointer mt-2">
                Access Sanctuary
            </button>
        </form>

        <div class="text-center">
            <p id="modeToggleWrapper" class="text-xs text-gray-400">
                <span id="staticPromptLabel">Already holding verified credentials?</span>
                <button type="button" id="switchBtn" class="text-[#8d0b0b] hover:underline font-medium ml-1 cursor-pointer">Log In Here</button>
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://njonmqbsqfvmwowbgfeb.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_u3_U6zXwc6UToJukPAkCPg_3ovi3yI9";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // State machine configuration tracking current view
        let isLoginMode = true; 

        const portalSubtitle = document.getElementById('portalSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const staticPromptLabel = document.getElementById('staticPromptLabel');
        const switchBtn = document.getElementById('switchBtn');
        const authForm = document.getElementById('authForm');

        // Bypasses entry gate instantly if a database active token is stored
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                window.location.href = 'app.html';
            }
        });

        // Safe toggle management engine that keeps button memory active
        switchBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                portalSubtitle.innerText = "Initialize Premium Entry";
                submitBtn.innerText = "Access Sanctuary";
                staticPromptLabel.innerText = "Already holding verified credentials?";
                switchBtn.innerText = "Log In Here";
            } else {
                portalSubtitle.innerText = "Create New Sanctuary Account";
                submitBtn.innerText = "Register Identity";
                staticPromptLabel.innerText = "New to the platform ecosystem?";
                switchBtn.innerText = "Sign Up Here";
            }
        });

        // Form Router
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (isLoginMode) {
                // Core execution path for existing profiles
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert(`Authentication Failed: ${error.message}`);
                } else {
                    window.location.href = 'app.html';
                }
            } else {
                // Core execution path for brand new sign-ups
                const { data, error } = await _supabase.auth.signUp({ email, password });
                if (error) {
                    alert(`Registration Failed: ${error.message}`);
                } else {
                    alert('Registration complete. Directing onto your dashboard platform sequence...');
                    window.location.href = 'app.html';
                }
            }
        });
    </script>
</body>
</html>
