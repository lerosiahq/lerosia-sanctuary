<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Erosia — Entry Gate</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase Core Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center bg-[#0a0a0a] px-4">

    <!-- Premium Branding Wrapper -->
    <div class="max-w-md w-full bg-[#121212] border border-[#222] rounded-2xl p-8 space-y-6 shadow-2xl">
        <div class="text-center space-y-2">
            <h1 id="portalTitle" class="text-xl tracking-[0.4em] text-[#8d0b0b] font-bold uppercase">L'Erosia</h1>
            <p id="portalSubtitle" class="text-xs uppercase tracking-widest text-gray-400">Initialize Premium Entry</p>
        </div>

        <!-- Single Core Authentication Form -->
        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">Digital Identifier (Email)</label>
                <input type="email" id="emailInput" required class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg p-3 text-sm focus:outline-none focus:border-[#8d0b0b] text-white">
            </div>
            
            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">Security Key (Password)</label>
                <input type="password" id="passwordInput" required class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg p-3 text-sm focus:outline-none focus:border-[#8d0b0b] text-white">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-[#8d0b0b] hover:bg-[#b00e0e] text-white text-xs uppercase font-bold tracking-widest py-3 rounded-lg transition-colors cursor-pointer mt-2">
                Access Sanctuary
            </button>
        </form>

        <!-- Dynamic Interface Switcher -->
        <div class="text-center">
            <p id="switchText" class="text-xs text-gray-400">
                Already holding verified credentials? 
                <button id="switchBtn" class="text-[#8d0b0b] hover:underline font-medium ml-1 cursor-pointer">Log In Here</button>
            </p>
        </div>
    </div>

    <!-- Interface Controller & Supabase Database Core Script -->
    <script>
        const SUPABASE_URL = "https://njonmqbsqfvmwowbgfeb.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_u3_U6zXwc6UToJukPAkCPg_3ovi3yI9";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // App state tracking variable: true = login mode, false = signup/registration mode
        let isLoginMode = true; 

        const portalSubtitle = document.getElementById('portalSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const switchText = document.getElementById('switchText');
        const switchBtn = document.getElementById('switchBtn');
        const authForm = document.getElementById('authForm');

        // Check if user is already logged in right away. If they are, push them straight into the sanctuary.
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                window.location.href = 'app.html';
            }
        });

        // Dynamic layout switcher toggle engine
        switchBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                portalSubtitle.innerText = "Initialize Premium Entry";
                submitBtn.innerText = "Access Sanctuary";
                switchText.innerHTML = `Already holding verified credentials? <button id="switchBtn" class="text-[#8d0b0b] hover:underline font-medium ml-1 cursor-pointer">Log In Here</button>`;
            } else {
                portalSubtitle.innerText = "Create New Sanctuary Account";
                submitBtn.innerText = "Register Identity";
                switchText.innerHTML = `New to the platform ecosystem? <button id="switchBtn" class="text-[#8d0b0b] hover:underline font-medium ml-1 cursor-pointer">Sign Up Here</button>`;
            }
            // Re-bind click event to the newly rendered button node
            document.getElementById('switchBtn').addEventListener('click', arguments.callee);
        });

        // Unified form submit handler routing traffic based on auth state mode
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (isLoginMode) {
                // Execute standard Supabase sign-in protocols
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert(`Authentication Failed: ${error.message}`);
                } else {
                    window.location.href = 'app.html';
                }
            } else {
                // Execute sign-up protocols
                const { data, error } = await _supabase.auth.signUp({ email, password });
                if (error) {
                    alert(`Registration Failed: ${error.message}`);
                } else {
                    alert('Registration submitted successfully! Welcome to L\'Erosia.');
                    window.location.href = 'app.html';
                }
            }
        });
    </script>
</body>
</html>
