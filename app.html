        <header class="bg-[#121212] border-b border-[#222] p-4 flex items-center justify-between sticky top-0">
            <span class="text-sm font-medium uppercase tracking-wider text-gray-200">Customize Identity</span>
            <button onclick="toggleProfileModal(false)" class="text-gray-400 hover:text-white text-sm cursor-pointer">Close</button>

            </div>
            <button type="submit" class="w-full bg-[#8d0b0b] text-white text-xs uppercase font-bold py-3 rounded-lg">Synchronize Identity</button>
        </form>
    </div>

    <div id="chatModal" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col justify-between max-w-md mx-auto">

            <button onclick="closeChat()" class="text-gray-400 text-sm uppercase">Close</button>

        <div id="chatControlsContainer" class="bg-[#121212] border-t border-[#222]">
