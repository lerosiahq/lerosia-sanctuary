<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Erosia — Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-sans">

    <main id="app" class="p-6 max-w-lg mx-auto min-h-screen flex items-center justify-center">
        <!-- The app will inject the Login page here first -->
    </main>

    <script>
        // Simple state management
        let isAuthenticated = false;

        function renderView(view) {
            const app = document.getElementById('app');
            
            if (view === 'login') {
                app.innerHTML = `
                    <div class="w-full space-y-6 text-center animate-in fade-in">
                        <h1 class="text-2xl font-bold tracking-[0.2em] text-[#8d0b0b] uppercase">L'Erosia</h1>
                        <p class="text-gray-400 text-sm">Enter your sanctuary.</p>
                        <button onclick="login()" class="w-full bg-[#8d0b0b] p-4 rounded-lg font-bold uppercase tracking-widest">Sign In</button>
                    </div>
                `;
            } else if (view === 'feed') {
                app.innerHTML = `
                    <div class="w-full space-y-6">
                        <header class="flex justify-between items-center pb-6 border-b border-[#222]">
                            <div class="text-[#8d0b0b] font-bold tracking-[0.2em] uppercase">L'Erosia</div>
                            <button onclick="renderView('profile')" class="text-[10px] uppercase text-gray-400">Profile</button>
                        </header>
                        <div class="p-6 bg-[#121212] rounded-2xl border border-[#222]">
                            <p class="text-[10px] text-gray-500 uppercase">Account Status</p>
                            <p class="text-lg font-bold">Premium Sanctuary Active</p>
                        </div>
                        <h2 class="text-xs uppercase text-[#8d0b0b] font-bold">Matched Desires</h2>
                        <div class="text-gray-400 text-sm italic">No active desires matched.</div>
                    </div>
                `;
            }
        }

        function login() {
            isAuthenticated = true;
            renderView('feed');
        }

        // Initialize at the login screen
        renderView('login');
    </script>
</body>
</html>
